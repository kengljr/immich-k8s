name: Configuration Build
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  unit-tests: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: install nginx
        run: sudo apt install nginx -y

      - name: Validate nginx config
        run: |
          sudo cp docker/nginx/my-app.conf /etc/nginx/conf.d/default.conf
          sed 's/immich-server/127.0.0.1/' docker/nginx/my-app.conf | sudo tee /etc/nginx/conf.d/default.conf > /dev/null
          sudo nginx -t

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build the test environtment
        run: |
          cat <<EOF > .env
          IMMICH_VERSION=release
          UPLOAD_LOCATION=./uploads
          DB_DATA_LOCATION=./db
          DB_PASSWORD=test
          DB_USERNAME=postgres
          DB_DATABASE_NAME=immich
          EOF
      
      - name: Start container
        run: docker compose up -d -f docker/docker-compose.yaml

      - name: Wait for service startup
        run: sleep 20

      - name: Test nginx proxy
        run: curl -f http://localhost:80

      - name: Show logs on failure
        if: failure()
        run: docker compose logs